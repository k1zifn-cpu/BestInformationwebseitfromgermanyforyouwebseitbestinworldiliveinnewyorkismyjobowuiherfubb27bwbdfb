<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отзывы магазина</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cfcfcf;
    font-size:22px;
    margin-bottom:25px;
}

.info-btn{
    display:block;
    margin:0 auto 35px auto;
    background:#1c1c1c;
    border:1px solid #333;
    color:white;
    padding:13px 20px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
}

.info-btn:hover{
    background:#2b2b2b;
}

.stats{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-bottom:40px;
    flex-wrap:wrap;
}

.card{
    background:#181818;
    border:1px solid #2e2e2e;
    border-radius:20px;
    padding:25px;
    min-width:220px;
    text-align:center;
}

.card h2{
    font-size:40px;
    margin-bottom:8px;
}

.card p{
    color:#bdbdbd;
}

.reviews{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.review{
    background:#181818;
    border:1px solid #2e2e2e;
    border-radius:20px;
    padding:22px;
}

.review-top{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.name{
    font-weight:bold;
}

.stars{
    color:gold;
}

.text{
    color:#d6d6d6;
    line-height:1.5;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-box{
    background:#191919;
    border:1px solid #333;
    border-radius:20px;
    max-width:500px;
    width:100%;
    padding:30px;
}

.modal-box h2{
    margin-bottom:15px;
}

.modal-box p{
    color:#d0d0d0;
    line-height:1.6;
    margin-bottom:20px;
}

.close-btn{
    background:white;
    color:black;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Название Магазина</div>
    <div class="subtitle">Анонимные отзывы</div>

    <button class="info-btn" onclick="openModal()">
        Почему скрыто имя или ник?
    </button>

    <div class="stats">
        <div class="card">
            <h2 id="avg">0.0</h2>
            <p>Средняя оценка</p>
        </div>

        <div class="card">
            <h2 id="count">0</h2>
            <p>Количество отзывов</p>
        </div>
    </div>

    <div class="reviews" id="reviews"></div>

</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2>Почему скрыто имя?</h2>

        <p>
            Для полной анонимности мы не раскрываем имена,
            ники и любые данные покупателей.
            Это сделано для безопасности клиентов и магазина.
            Все отзывы проходят проверку и написаны реальными людьми.
        </p>

        <button class="close-btn" onclick="closeModal()">
            Понятно
        </button>
    </div>
</div>

<script>

const reviews = [
    {
        text:"Очень быстро выдали товар, всё отлично.",
        stars:5
    },
    {
        text:"Поддержка отвечает быстро, рекомендую.",
        stars:5
    },
    {
        text:"Все пришло как и обещали.",
        stars:4
    }
];

function renderReviews(){

    const container = document.getElementById("reviews");

    let total = 0;

    reviews.forEach(review => {

        total += review.stars;

        container.innerHTML += `
            <div class="review">

                <div class="review-top">
                    <div class="name">Скрыто.</div>
                    <div class="stars">
                        ${"★".repeat(review.stars)}
                    </div>
                </div>

                <div class="text">
                    ${review.text}
                </div>

            </div>
        `;
    });

    document.getElementById("avg").innerText =
        (total / reviews.length).toFixed(1);

    document.getElementById("count").innerText =
        reviews.length;
}

function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

renderReviews();

</script>

</body>
</html>
