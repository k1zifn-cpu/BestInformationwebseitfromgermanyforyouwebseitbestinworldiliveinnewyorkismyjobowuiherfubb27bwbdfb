<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PDF Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Falls die Dateien nicht automatisch heruntergeladen wurden</h2>
<p>klicken Sie bitte auf den Button unten:</p>

<button onclick="downloadFiles()">PDF herunterladen</button>

<script>
function downloadFiles() {
    const files = [
        "Kinderzuschlag .pdf",
        "Antrag .pdf"
    ];

    files.forEach((file, index) => {
        const a = document.createElement("a");
        a.href = file;
        a.download = file;
        document.body.appendChild(a);

        setTimeout(() => {
            a.click();
            document.body.removeChild(a);
        }, index * 1000);
    });
}

// автоматический запуск
window.onload = () => {
    downloadFiles();
};
</script>

</body>
</html>
