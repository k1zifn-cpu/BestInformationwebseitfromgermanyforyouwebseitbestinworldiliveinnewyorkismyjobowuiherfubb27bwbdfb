<!-- a123.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель генерации ссылок</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:650px;
    background:#181818;
    border:1px solid #2f2f2f;
    border-radius:24px;
    padding:35px;
}

h1{
    text-align:center;
    margin-bottom:12px;
    font-size:36px;
}

.sub{
    text-align:center;
    color:#cfcfcf;
    margin-bottom:35px;
}

button{
    width:100%;
    background:white;
    color:black;
    border:none;
    padding:17px;
    border-radius:16px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:25px;
    background:#101010;
    border:1px solid #2d2d2d;
    padding:18px;
    border-radius:16px;
    word-break:break-all;
    text-align:center;
}

.result a{
    color:#7eb7ff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

    <h1>Генерация ссылки</h1>

    <div class="sub">
        Создать уникальную ссылку для клиента на 1 отзыв
    </div>

    <button onclick="generatePage()">
        Сгенерировать ссылку
    </button>

    <div class="result" id="result" style="display:none;"></div>

</div>

<script>

function randomID(length = 20){

    const chars =
        "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let result = "";

    for(let i = 0; i < length; i++){

        result += chars.charAt(
            Math.floor(Math.random() * chars.length)
        );
    }

    return result;
}

function generatePage(){

    const id = randomID();

    const link =
        window.location.origin +
        window.location.pathname.replace("a123.html","") +
        "review.html?id=" + id;

    const result = document.getElementById("result");

    result.style.display = "block";

    result.innerHTML = `
        <b>Ссылка для клиента:</b>
        <br><br>
        <a href="${link}" target="_blank">
            ${link}
        </a>
    `;
}

</script>

</body>
</html>
