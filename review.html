<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оставить отзыв</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:650px;
    background:#181818;
    border:1px solid #2f2f2f;
    border-radius:24px;
    padding:35px;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:36px;
}

.sub{
    text-align:center;
    color:#cfcfcf;
    margin-bottom:30px;
}

textarea{
    width:100%;
    height:180px;
    background:#101010;
    border:1px solid #333;
    border-radius:16px;
    color:white;
    padding:15px;
    resize:none;
    margin-bottom:20px;
    font-size:15px;
}

select{
    width:100%;
    background:#101010;
    border:1px solid #333;
    border-radius:16px;
    color:white;
    padding:15px;
    margin-bottom:20px;
}

button{
    width:100%;
    background:white;
    color:black;
    border:none;
    padding:16px;
    border-radius:16px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.success{
    margin-top:20px;
    background:#101010;
    border:1px solid #2f2f2f;
    border-radius:16px;
    padding:18px;
    text-align:center;
    color:#7dff9b;
    display:none;
}
</style>
</head>

<body>

<div class="box">

    <h1>Оставьте отзыв</h1>

    <div class="sub">
        Ваш отзыв будет опубликован анонимно
    </div>

    <textarea
        id="reviewText"
        placeholder="Введите ваш отзыв..."
    ></textarea>

    <select id="reviewStars">
        <option value="5">★★★★★ — 5 звезд</option>
        <option value="4">★★★★☆ — 4 звезды</option>
        <option value="3">★★★☆☆ — 3 звезды</option>
        <option value="2">★★☆☆☆ — 2 звезды</option>
        <option value="1">★☆☆☆☆ — 1 звезда</option>
    </select>

    <button onclick="publishReview()">
        Опубликовать анонимно
    </button>

    <div class="success" id="success">
        Отзыв успешно отправлен.
    </div>

</div>

<script>

function publishReview(){

    const text =
        document.getElementById("reviewText").value.trim();

    const stars =
        document.getElementById("reviewStars").value;

    if(!text){

        alert("Введите текст отзыва");
        return;
    }

    // Тут позже можно подключить Telegram бота,
    // Firebase или базу данных

    console.log({
        text:text,
        stars:stars
    });

    document.getElementById("success").style.display =
        "block";

    document.getElementById("reviewText").value = "";

    document.getElementById("reviewStars").value = "5";
}

</script>

</body>
</html>
